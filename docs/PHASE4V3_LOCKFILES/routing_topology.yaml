# ============================================================
# Per-class routing constraints (for audit_routing.py enforcement)
# ============================================================

# factor_of_safety schema (Sai-locked 2026-05-28 "no cut-to-cut"):
#   Every physical quantity in a routing class declares a FoS so the design
#   target is limit÷FoS (ceilings) or requirement×FoS (floors), never the raw
#   limit. Values align with the implemented FoS gates so routing inherits them:
#     ampacity_continuous: 1.5  (audit_fos_current.py G_FoS2)
#     ampacity_burst:      1.2  (audit_fos_current.py G_FoS2)
#     via_current:         1.5  (audit_via_current_capacity.py FOS_VIA)
#     clearance:           above-fab-min  (never == JLC 0.0889mm process floor)
#     impedance:           band  (W chosen so Z0 stays within ±10% fab tolerance)
#   See ROUTING_METHODOLOGY.md §5c for the full FoS table + sources.
#   STATUS: schema — concrete numeric targets computed from physics_primitives
#   at plan time; the declared FoS multipliers are the binding policy here.

routing_classes:

  power-plane:
    width_constraint: plane
    spacing_constraint: 1.0mm  # to other plane
    via_constraint: stitching
    factor_of_safety:
      ampacity_burst: 1.2       # +VMOTOR 280A burst, plane (G_FoS2)
      via_current: 1.5          # stitching via count derate (audit_via_current_capacity)
      clearance: above-fab-min

  power-trunk:
    width_min_mm: 1.5
    spacing_min_mm: 0.5
    z0: null
    length_match: false
    factor_of_safety:
      ampacity_continuous: 1.5  # +BATT 40A continuous (G_FoS2)
      via_current: 1.5
      clearance: above-fab-min

  bec-trunk:
    width_min_mm: 1.0
    spacing_min_mm: 0.5
    z0: null
    length_match: false
    factor_of_safety:
      ampacity_continuous: 1.5  # BEC rails (G_FoS2)
      via_current: 1.5
      clearance: above-fab-min

  decoupling:
    width_min_mm: 0.5
    spacing_min_mm: 0.2
    z0: null
    length_match: false
    same_layer_as_ic: true  # R25
    factor_of_safety:
      clearance: above-fab-min
      loop_inductance: margin   # ESL below decoupling-effectiveness budget (Tier 3 sim)

  signal-highway:
    width_min_mm: 0.25
    spacing_min_mm: 0.25
    z0: 50  # SE controlled-impedance
    length_match: true  # per-group tolerance in net entry
    factor_of_safety:
      impedance: band           # W keeps Z0 within ±10% across fab stack tolerance
      clearance: above-fab-min
      crosstalk: margin         # 3W-or-better vs aggressor parallel runs

  signal-diff:
    width_min_mm: 0.20
    spacing_min_mm: 0.15
    z0: 90  # diff
    length_match: true
    factor_of_safety:
      impedance: band           # diff Z0 within ±10%
      clearance: above-fab-min
      crosstalk: margin

  analog-star:
    width_min_mm: 0.25
    spacing_min_mm: 0.25
    z0: null
    length_match: true  # all sinks within 5mm
    factor_of_safety:
      clearance: above-fab-min
      crosstalk: margin         # shielded from switching (Tier 4)

  ground-plane:
    width_constraint: plane
    spacing_constraint: 0.3mm
    via_constraint: stitching
    factor_of_safety:
      via_current: 1.5
      clearance: above-fab-min



# ============================================================
# Per-class routing constraints (for audit_routing.py enforcement)
# ============================================================

routing_classes:

  power-plane:
    width_constraint: plane
    spacing_constraint: 1.0mm  # to other plane
    via_constraint: stitching

  power-trunk:
    width_min_mm: 1.5
    spacing_min_mm: 0.5
    z0: null
    length_match: false

  bec-trunk:
    width_min_mm: 1.0
    spacing_min_mm: 0.5
    z0: null
    length_match: false

  decoupling:
    width_min_mm: 0.5
    spacing_min_mm: 0.2
    z0: null
    length_match: false
    same_layer_as_ic: true  # R25

  signal-highway:
    width_min_mm: 0.25
    spacing_min_mm: 0.25
    z0: 50  # SE controlled-impedance
    length_match: true  # per-group tolerance in net entry

  signal-diff:
    width_min_mm: 0.20
    spacing_min_mm: 0.15
    z0: 90  # diff
    length_match: true

  analog-star:
    width_min_mm: 0.25
    spacing_min_mm: 0.25
    z0: null
    length_match: true  # all sinks within 5mm

  ground-plane:
    width_constraint: plane
    spacing_constraint: 0.3mm
    via_constraint: stitching



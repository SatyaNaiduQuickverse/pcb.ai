# Routing topology + component role classification — SSoT for Phase 4-v3
#
# Two consumers, one source:
# 1. `place_subsystem.py bringSelected()` reads role + parent + max_distance
#    to deterministically place each component (no random search)
# 2. `route_tier.py` reads tier + topology + Z0 + length_match to route
#    constraint-driven (no Freerouter)
#
# Per `[[feedback-sureshot-over-sota]]`: every entry is explicit, no inference,
# no ML, no autoplacer. Industry-standard constraint-driven approach.
#
# Changes require PR title tag `[methodology-change]` and recompute
# ROUTING_TOPOLOGY_HASH via `audit_routing_system.py --write`.

version: 1
created: 2026-05-25
status: schema-and-skeleton  # worker fills concrete entries during REDO infra PR

# ============================================================
# Net classification (per-net)
# ============================================================

nets:

  # ---- Tier 1: PDN (Power Delivery Network) ----

  +VMOTOR:
    tier: 1
    class: power-plane
    topology: plane-via-grid
    layer: In3.Cu
    width: plane
    constraint:
      ampacity_A: 280  # burst per IPC-2152 + spec
      copper_oz: 3
      via_stitching_density_per_cm2: 4  # min for 280A spread

  GND:
    tier: 1
    class: ground-plane
    topology: plane-continuous
    layer: [In1.Cu, In5.Cu]
    width: plane
    split: false  # single GND, no analog/digital split (Bogatin Ch. 4)

  +BATT:
    tier: 1
    class: power-trunk
    topology: star
    source: J1.pin1  # XT30 +
    sink: [S3.input, S2.input]  # to supervisor + bulk caps
    layer: F.Cu
    ref_layer: In1.Cu
    width_mm: 2.5
    ampacity_A: 40  # continuous

  +3V3:
    tier: 1
    class: bec-trunk
    topology: tree
    source: U_BEC_3V3.OUT
    sinks: [each_CHn_MCU.VDD, each_CHn_DRV.VDD_LV, U_SUPERVISOR.VDD]
    layer: In2.Cu  # signal/power mid-layer
    ref_layer: In1.Cu
    width_mm: 1.5
    ampacity_A: 10

  +5V:
    tier: 1
    class: bec-trunk
    topology: tree
    source: U_BEC_5V.OUT
    sinks: [each_CHn_DRV.VDD_5V, status_LEDs.VDD]
    layer: In2.Cu
    ref_layer: In1.Cu
    width_mm: 1.5
    ampacity_A: 10

  +9V:
    tier: 1
    class: bec-trunk
    topology: tree
    source: U_BEC_9V.OUT
    sinks: [each_CHn_DRV.VCC_GATE]  # high-side gate supply
    layer: In4.Cu
    ref_layer: In5.Cu
    width_mm: 1.5
    ampacity_A: 6

  +3V3A:
    tier: 1
    class: bec-trunk
    topology: tree
    source: U_LDO_3V3A.OUT
    sinks: [each_CHn_INA.VDD, U_SUPERVISOR.AVDD, U_HALL.VDD, each_CHn_CMP.VDD]
    layer: In4.Cu
    ref_layer: In5.Cu
    width_mm: 1.0
    ampacity_A: 3
    note: "Analog 3V3 — separate from digital +3V3 for noise isolation per Ott Ch. 18"

  # ---- Tier 4: Critical analog ----

  BUS_CURR_HALL_OUT:
    tier: 4
    class: analog-star
    topology: star
    source: U_HALL.OUT  # ACS770 analog out
    sinks: [each_CHn_MCU.ADC_BUS_I]
    layer: In4.Cu
    ref_layer: In5.Cu
    width_mm: 0.25
    note: "Star from single Hall to 4 channel MCUs; matched length within 5mm"

  # SHUNT_SENSE_CHn_POS / SHUNT_SENSE_CHn_NEG (per CHn)
  # Worker to expand per-channel entries from netlist

  # BEMF_A_CHn / BEMF_B_CHn / BEMF_C_CHn (per CHn, per phase)
  # Worker to expand per-channel entries from netlist

  # ---- Tier 5: Signal highways ----

  # DShot_CHn (per CHn)
  # Worker to expand per-channel entries from netlist
  # Schema:
  #   DShot_CH1:
  #     tier: 5
  #     class: signal-highway
  #     topology: point-to-point
  #     source: J11.pin_DSHOT_CH1
  #     sink: U_MCU_CH1.pin_PWM_IN
  #     z0: 50
  #     layer: In2.Cu
  #     ref_layer: In1.Cu
  #     length_match_group: dshot_ch1234
  #     length_match_tolerance_mm: 2

# ============================================================
# Component role classification (per-component)
# ============================================================

components:

  # ==== S6 connectors / BEC-LDO / ESD (Stage 0) — worker-filled from netlist 2026-05-26 ====
  # ICs are cluster-anchors placed in the S6 zone; ESD arrays cluster near the FC
  # header (J14, foundation @50,90) since they sit on the M*_RAW data lines. Passives
  # anchor to their parent IC pin per R23/R25. Refs map: J13=TLV76733 LDO,
  # J15-17=USBLC6 ESD, C45=LDO Vin, C46=LDO Vout, L11=VDDA ferrite, C47/C48=VDDA
  # bypass, D23=power-good LED, R35=LED limit-R.
  J13: {tier: 5, role: cluster-anchor, subsystem: S6, zone_hint: [70.0, 90.0]}
  J15: {tier: 5, role: cluster-anchor, subsystem: S6, near_anchor: J14, near_offset: [-10.0, -4.0]}
  J16: {tier: 5, role: cluster-anchor, subsystem: S6, near_anchor: J14, near_offset: [0.0, -4.0]}
  J17: {tier: 5, role: cluster-anchor, subsystem: S6, near_anchor: J14, near_offset: [10.0, -4.0]}
  C45: {tier: 5, role: decoupling, subsystem: S6, parent: J13, parent_pin: "3", max_distance_mm: 3, same_layer_as_parent: true}
  C46: {tier: 5, role: decoupling, subsystem: S6, parent: J13, parent_pin: "5", max_distance_mm: 3, same_layer_as_parent: true}
  L11: {tier: 5, role: cluster-member, subsystem: S6, parent: J13, parent_pin: "5", max_distance_mm: 5, same_layer_as_parent: true}
  C47: {tier: 5, role: decoupling, subsystem: S6, parent: L11, parent_pin: "2", max_distance_mm: 3, same_layer_as_parent: true}
  C48: {tier: 5, role: decoupling, subsystem: S6, parent: L11, parent_pin: "2", max_distance_mm: 3, same_layer_as_parent: true}
  R35: {tier: 5, role: cluster-member, subsystem: S6, parent: J13, parent_pin: "5", max_distance_mm: 8, same_layer_as_parent: true}
  D23: {tier: 5, role: cluster-member, subsystem: S6, parent: R35, parent_pin: "2", max_distance_mm: 3, same_layer_as_parent: true}


# ============================================================
# Mirror primitive (Tier 4)
# ============================================================

mirror_primitive:
  axis_x: 50.0  # board center x
  axis_y: 50.0  # board center y (for mirror_Y)
  ch2_from_ch1: mirror_X
  ch3_from_ch2: mirror_Y
  ch4_from_ch3: mirror_X
  algorithm: |
    # pure geometric transform, NO fp.Flip (changes layer)
    new_x = 2 * axis_x - old_x  (for mirror_X)
    new_y = 2 * axis_y - old_y  (for mirror_Y)
    new_rotation = (180 - old_rotation) % 360
    reset_text_to_body(fp)  # ref/value text re-centered
  tolerance_mm: 0.5  # per R19

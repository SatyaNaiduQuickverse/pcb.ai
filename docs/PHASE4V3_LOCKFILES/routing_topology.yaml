# Routing topology + component role classification — SSoT for Phase 4-v3
#
# Two consumers, one source:
# 1. `place_subsystem.py bringSelected()` reads role + parent + max_distance
#    to deterministically place each component (no random search)
# 2. `route_tier.py` reads tier + topology + Z0 + length_match to route
#    constraint-driven (no Freerouter)
#
# Per `[[feedback-sureshot-over-sota]]`: every entry is explicit, no inference,
# no ML, no autoplacer. Industry-standard constraint-driven approach.
#
# Changes require PR title tag `[methodology-change]` and recompute
# ROUTING_TOPOLOGY_HASH via `audit_routing_system.py --write`.

version: 1
created: 2026-05-25
status: schema-and-skeleton  # worker fills concrete entries during REDO infra PR

# ============================================================
# Net classification (per-net)
# ============================================================

nets:

  # ---- Tier 1: PDN (Power Delivery Network) ----

  +VMOTOR:
    tier: 1
    class: power-plane
    topology: plane-via-grid
    layer: In3.Cu
    width: plane
    constraint:
      ampacity_A: 280  # burst per IPC-2152 + spec
      copper_oz: 3
      via_stitching_density_per_cm2: 4  # min for 280A spread

  GND:
    tier: 1
    class: ground-plane
    topology: plane-continuous
    layer: [In1.Cu, In5.Cu]
    width: plane
    split: false  # single GND, no analog/digital split (Bogatin Ch. 4)

  +BATT:
    tier: 1
    class: power-trunk
    topology: star
    source: J1.pin1  # XT30 +
    sink: [S3.input, S2.input]  # to supervisor + bulk caps
    layer: F.Cu
    ref_layer: In1.Cu
    width_mm: 2.5
    ampacity_A: 40  # continuous

  +3V3:
    tier: 1
    class: bec-trunk
    topology: tree
    source: U_BEC_3V3.OUT
    sinks: [each_CHn_MCU.VDD, each_CHn_DRV.VDD_LV, U_SUPERVISOR.VDD]
    layer: In2.Cu  # signal/power mid-layer
    ref_layer: In1.Cu
    width_mm: 1.5
    ampacity_A: 10

  +5V:
    tier: 1
    class: bec-trunk
    topology: tree
    source: U_BEC_5V.OUT
    sinks: [each_CHn_DRV.VDD_5V, status_LEDs.VDD]
    layer: In2.Cu
    ref_layer: In1.Cu
    width_mm: 1.5
    ampacity_A: 10

  +9V:
    tier: 1
    class: bec-trunk
    topology: tree
    source: U_BEC_9V.OUT
    sinks: [each_CHn_DRV.VCC_GATE]  # high-side gate supply
    layer: In4.Cu
    ref_layer: In5.Cu
    width_mm: 1.5
    ampacity_A: 6

  +3V3A:
    tier: 1
    class: bec-trunk
    topology: tree
    source: U_LDO_3V3A.OUT
    sinks: [each_CHn_INA.VDD, U_SUPERVISOR.AVDD, U_HALL.VDD, each_CHn_CMP.VDD]
    layer: In4.Cu
    ref_layer: In5.Cu
    width_mm: 1.0
    ampacity_A: 3
    note: "Analog 3V3 — separate from digital +3V3 for noise isolation per Ott Ch. 18"

  # ---- Tier 4: Critical analog ----

  BUS_CURR_HALL_OUT:
    tier: 4
    class: analog-star
    topology: star
    source: U_HALL.OUT  # ACS770 analog out
    sinks: [each_CHn_MCU.ADC_BUS_I]
    layer: In4.Cu
    ref_layer: In5.Cu
    width_mm: 0.25
    note: "Star from single Hall to 4 channel MCUs; matched length within 5mm"

  # SHUNT_SENSE_CHn_POS / SHUNT_SENSE_CHn_NEG (per CHn)
  # Worker to expand per-channel entries from netlist

  # BEMF_A_CHn / BEMF_B_CHn / BEMF_C_CHn (per CHn, per phase)
  # Worker to expand per-channel entries from netlist

  # ---- Motor-pad-clear keep-out EXEMPT net list (Sai 2026-05-26 worker call) ----

# Routing topology + component role classification — SSoT for Phase 4-v3
#
# Two consumers, one source:
# 1. `place_subsystem.py bringSelected()` reads role + parent + max_distance
#    to deterministically place each component (no random search)
# 2. `route_tier.py` reads tier + topology + Z0 + length_match to route
#    constraint-driven (no Freerouter)
#
# Per `[[feedback-sureshot-over-sota]]`: every entry is explicit, no inference,
# no ML, no autoplacer. Industry-standard constraint-driven approach.
#
# Changes require PR title tag `[methodology-change]` and recompute
# ROUTING_TOPOLOGY_HASH via `audit_routing_system.py --write`.
# ROUTING_TOPOLOGY_HASH = fdcac20bfb80fb9e7ec0b71a9667fa3d32e6a72fafd21de2b6ba8c600357274f

version: 1
created: 2026-05-25
status: schema-and-skeleton  # worker fills concrete entries during REDO infra PR

# ============================================================
# Global routing-process parameter (Phase B — engine FoS-on-process)
# Added 2026-05-28 per ROUTING_METHODOLOGY §0b/§5c (global→detailed engine).
# ============================================================
#
# The global planner fills doors/corridors to AT MOST this fraction of capacity,
# never 100%. This is the Factor of Safety on the routing PROCESS itself and the
# root-cause fix for the 24/30 corner-paint plateau (greedy filled a corridor to
# 100%, leaving no slack for negotiated congestion or later nets).
# Source: ISPD-2008 global-routing convention (any overflow = failure) + Sai
# FoS-everywhere mandate 2026-05-28. STATUS: schema — concrete per-board value
# tuned in a later phase, kept in the 0.75–0.80 band per ROUTING_METHODOLOGY §5c.

global_capacity_headroom:
  max_door_fill_fraction: 0.80      # door demand ≤ 0.80 × door capacity at plan time
  max_corridor_fill_fraction: 0.75  # corridor demand ≤ 0.75 × corridor capacity
  overflow_policy: forbid           # any planned edge demand > capacity ⇒ Phase A escalation
  metric: ispd_total_overflow       # rank by Total Overflow then Max Overflow (ISPD-2008)

# ============================================================
# Net classification (per-net)
# ============================================================

nets:

  # ---- Tier 1: PDN (Power Delivery Network) ----

  +VMOTOR:
    tier: 1
    class: power-plane
    topology: plane-via-grid
    layer: In3.Cu
    width: plane
    constraint:
      ampacity_A: 280  # burst per IPC-2152 + spec
      copper_oz: 3
      via_stitching_density_per_cm2: 4  # min for 280A spread

  GND:
    tier: 1
    class: ground-plane
    topology: plane-continuous
    layer: [In1.Cu, In5.Cu]
    width: plane
    split: false  # single GND, no analog/digital split (Bogatin Ch. 4)

  +BATT:
    tier: 1
    class: power-trunk
    topology: star
    source: J1.pin1  # XT30 +
    sink: [S3.input, S2.input]  # to supervisor + bulk caps
    layer: F.Cu
    ref_layer: In1.Cu
    width_mm: 2.5
    ampacity_A: 40  # continuous

  +3V3:
    tier: 1
    class: bec-trunk
    topology: tree
    source: U_BEC_3V3.OUT
    sinks: [each_CHn_MCU.VDD, each_CHn_DRV.VDD_LV, U_SUPERVISOR.VDD]
    layer: In2.Cu  # signal/power mid-layer
    ref_layer: In1.Cu
    width_mm: 1.5
    ampacity_A: 10

  +5V:
    tier: 1
    class: bec-trunk
    topology: tree
    source: U_BEC_5V.OUT
    sinks: [each_CHn_DRV.VDD_5V, status_LEDs.VDD]
    layer: In2.Cu
    ref_layer: In1.Cu
    width_mm: 1.5
    ampacity_A: 10

  +9V:
    tier: 1
    class: bec-trunk
    topology: tree
    source: U_BEC_9V.OUT
    sinks: [each_CHn_DRV.VCC_GATE]  # high-side gate supply
    layer: In4.Cu
    ref_layer: In5.Cu
    width_mm: 1.5
    ampacity_A: 6

  +3V3A:
    tier: 1
    class: bec-trunk
    topology: tree
    source: U_LDO_3V3A.OUT
    sinks: [each_CHn_INA.VDD, U_SUPERVISOR.AVDD, U_HALL.VDD, each_CHn_CMP.VDD]
    layer: In4.Cu
    ref_layer: In5.Cu
    width_mm: 1.0
    ampacity_A: 3
    note: "Analog 3V3 — separate from digital +3V3 for noise isolation per Ott Ch. 18"

  # ---- Tier 2: Switching nodes (per CHn, per phase) ----
  # The SW node is the HS-FET source / LS-FET drain hub that carries the
  # full phase current (100A continuous / 280A burst per channel). The
  # F.Cu↔B.Cu via cluster between HS+LS+motor pad is the ampacity-critical
  # bottleneck; G_R5 (audit_via_current_capacity.py) reads ampacity_continuous_A
  # + ampacity_burst_A to compute the required via count vs. actual.
  # Added 2026-05-28 per `docs/CH1_DRONE_RELIABILITY_SWEEP_2026-05-28.md`
  # Finding #1 (was a coverage hole — these nets had no ampacity declaration
  # so G_R5 silently passed at 5/5/6 routed vias against the 100A continuous
  # requirement).

  MOTOR_A_CH1:
    tier: 2
    class: switching-node
    topology: F.Cu-via-cluster-B.Cu
    constraint:

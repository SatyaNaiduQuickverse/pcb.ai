# ============================================================
# DOORS — corridor cross-sections (Phase B first-class objects)
# Added 2026-05-28 per ROUTING_METHODOLOGY §0b Phase B.
# ============================================================
#
# A DOOR is a corridor cross-section through which nets pass. Each door declares
# capacity (how many tracks/vias the cross-section supports) and which net /
# net-group passes through it, in ORDER (topology-before-geometry). The global
# planner assigns nets to doors with capacity headroom (see global_capacity_headroom)
# and orders nets through each door BEFORE geometry exists.
#
# Two door categories:
#   - board-edge / inter-subsystem doors ARE the BOARD_INVARIANTS.md
#     "Subsystem I/O ports" table — REFERENCED here by id, NOT redefined.
#     (coord/width/signals are owned by BOARD_INVARIANTS; do not duplicate values.)
#   - interior doors = channel mouths between component clusters + highway entries
#     (BOARD_INVARIANTS.md "Highway reservations").
#
# STATUS: schema only. Concrete coords come from BOARD_INVARIANTS (single source);
# capacity numbers are computed by Phase A (boundary÷pitch per layer) at plan time.
# Do NOT fill concrete CH1 numbers here (later phase).

doors:

  # ---- Schema (one entry per door) ----
  #
  # <door_id>:
  #   source: BOARD_INVARIANTS            # 'BOARD_INVARIANTS' = coord/width owned there
  #   invariant_ref: "S6 -> CH1"          # exact row in BOARD_INVARIANTS I/O ports table
  #   coord: [x, y]                       # REFERENCED from BOARD_INVARIANTS (do not edit here)
  #   width_mm: <w>                        # REFERENCED from BOARD_INVARIANTS
  #   layers: [In2.Cu, In8.Cu]            # signal layers crossing this door
  #   capacity:
  #     tracks: <computed-by-PhaseA>      # boundary_len / (trace_w + clearance) per layer, summed
  #     via_slots: <computed-by-PhaseA>   # via sites fitting the fanout band
  #     status: computed-phase-a          # NOT hand-set; deterministic counting
  #   passes:                             # net / net-group, IN ORDER (rubber-band / VCG)
  #     - { order: 0, net_group: dshot_chN }
  #     - { order: 1, net_group: tlm_chN }
  #   fill_target: 0.80                    # ≤ global_capacity_headroom.max_door_fill_fraction
  #   category: inter-subsystem | interior-channel-mouth | highway-entry
  #
  # ---- Interior door schema (channel mouth / highway entry) ----
  #
  # <interior_door_id>:
  #   source: ROUTING_TOPOLOGY            # interior door computed from cluster geometry
  #   between: [Q_HS_CH1_cluster, J18_south_edge]   # the two cluster sides bounding the mouth
  #   coord: [x, y]                        # corridor centroid (computed from placement)
  #   width_mm: <w>                        # narrowest cross-section of the corridor
  #   layers: [In2.Cu, In4.Cu, In8.Cu]
  #   capacity: { tracks: <PhaseA>, via_slots: <PhaseA>, status: computed-phase-a }
  #   passes: []                           # ordered net list, planner-assigned
  #   fill_target: 0.75                    # corridor headroom
  #   escape_precheck: false               # true for fine-pitch-IC escape doors (J18/J19)
  #   category: interior-channel-mouth

  # Fine-pitch-IC escape doors (Phase A escape pre-check ledger applies here).
  # These map to BOARD_INVARIANTS HDI whitelist (J18 QFN-32, J19 HVQFN-24, 0.5mm).
  # j18_south_escape:
  #   source: ROUTING_TOPOLOGY
  #   ic: J18                              # BOARD_INVARIANTS HDI whitelist
  #   side: south
  #   pitch_mm: 0.5
  #   layers: [In2.Cu, In4.Cu, In8.Cu]
  #   capacity:                            # Phase A computes supply per side per layer
  #     escape_demand: <PhaseA>            # nets that must escape this side
  #     escape_supply: <PhaseA>            # tracks-between-pads + via-slot count
  #     status: computed-phase-a
  #   hdi_via_in_pad: true                 # per BOARD_INVARIANTS HDI whitelist + R35
  #   verdict: <ROUTABLE|NEEDS-HDI|NEEDS-PLACEMENT-CHANGE|INFEASIBLE>  # Phase A output
  #   escape_precheck: true
  #   category: interior-channel-mouth

# ============================================================
# Component role classification (per-component)
# ============================================================
#
# Role taxonomy (used by role_place + audits):
#
#   cluster-anchor    : positioned by zone_hint or near_anchor offset;
#                        starts a cluster. Examples: ICs, gate drivers, MCU.
#   cluster-member    : near a parent_pin within max_distance_mm. Tight.
#                        Examples: gate-R, BST cap, ferrite, op-amp filter cap.
#   cluster-aux       : in subsystem zone + same layer as parent;
#                        NOT distance-constrained to a specific pin.
#                        Examples: OR-gate diode caps (D34/D36 BAT54), BEMF
#                        divider auxiliary caps, status-LED bypass caps,
#                        comparator hysteresis caps — NOT decoupling (R25),
#                        NOT switching-loop (G3). They serve nearby nodes
#                        but routing flexibility lets them sit anywhere
#                        in-zone same-side without electrical penalty.
#                        Added 2026-05-26 (worker fits() debug — relaxes
#                        over-constrained density on dense channels).
#   decoupling        : ≤3mm same-layer to parent_pin (R25 enforced via G4).
#   loop-member       : in switching loop (HS/LS/shunt/cap) — G3 audits.
#
# fits() over-rejection note (2026-05-26 worker catch):
#   When max_distance_mm is too tight AND the zone has highway/edge keepouts
#   AND MIN_CENTER 1.6mm, the free-space tessellation fragments such that
#   even 14% area-dense zones can have 0 fittable slots for a small (1.6mm)
#   cap. cluster-aux role bypasses this by allowing zone-wide search.

components:

  # ==== S6 connectors / BEC-LDO / ESD (Stage 0) — worker-filled from netlist 2026-05-26 ====
  # ICs are cluster-anchors placed in the S6 zone; ESD arrays cluster near the FC
  # header (J14, foundation @50,90) since they sit on the M*_RAW data lines. Passives
  # anchor to their parent IC pin per R23/R25. Refs map: J13=TLV76733 LDO,
  # J15-17=USBLC6 ESD, C45=LDO Vin, C46=LDO Vout, L11=VDDA ferrite, C47/C48=VDDA
  # bypass, D23=power-good LED, R35=LED limit-R.
  J13: {tier: 5, role: cluster-anchor, subsystem: S6, zone_hint: [25.0, 7.0]}
  J15: {tier: 5, role: cluster-anchor, subsystem: S6, near_anchor: J14, near_offset: [-13.0, 0.0]}
  J16: {tier: 5, role: cluster-anchor, subsystem: S6, near_anchor: J14, near_offset: [-19.0, 0.0]}
  J17: {tier: 5, role: cluster-anchor, subsystem: S6, near_anchor: J14, near_offset: [13.0, 0.0]}
  C45: {tier: 5, role: decoupling, subsystem: S6, parent: J13, parent_pin: "3", max_distance_mm: 3, same_layer_as_parent: true}
  C46: {tier: 5, role: decoupling, subsystem: S6, parent: J13, parent_pin: "5", max_distance_mm: 3, same_layer_as_parent: true}
  L11: {tier: 5, role: cluster-member, subsystem: S6, parent: J13, parent_pin: "5", max_distance_mm: 5, same_layer_as_parent: true}
  C47: {tier: 5, role: decoupling, subsystem: S6, parent: L11, parent_pin: "2", max_distance_mm: 3, same_layer_as_parent: true}
  C48: {tier: 5, role: cluster-aux, subsystem: S6, parent: L11, parent_pin: "2", same_layer_as_parent: true}  # surplus 2nd cap on L11.2 (C47 holds the <=3mm slot); L11 is inductor not IC-VDD -> bulk/aux not R25

  # Worker to expand per-channel entries from netlist

  # ---- Motor-pad-clear keep-out EXEMPT net list (Sai 2026-05-26 worker call) ----
  # Components on these nets are TOPOLOGICALLY at the half-bridge node and
  # MUST live within the motor-pad keep-out zone (R25 same-side decoupling +
  # Erickson loop area + thermal proximity). Placer + audit both honor:
  motor_pad_clear_exempt_nets:
    # 2026-05-26 worker netlist-verified regex (matches pcbai_fpv4in1.net actuals).
    # SHUNT, CSA, gate-drive (GH/GL), BST bootstrap, BEMF, MOTOR phases, VMOTOR
    # bulk — all topologically at the half-bridge node (R23/R25/Erickson loop).
    # This is the SAME regex as place_subsystem.py _MOTOR_ADJ_NET_RE so placer
    # and G5 audit agree (worker confirmed).
    regex: "^(MOTOR_[ABC]_CH\\d+|BEMF_[ABC]_CH\\d+|CSA_[ABC]_OUT_CH\\d+|CSA_MAX_CH\\d+|SHUNT_[ABC]_TOP_CH\\d+|GH[ABC]_CH\\d+|GL[ABC]_CH\\d+|BST[ABC]_CH\\d+|\\+?VMOTOR(_CH\\d*)?)$"
    # Exempt categories (each verified against pcbai_fpv4in1.net):
    #   MOTOR_[ABC]_CH[1-4]      — 12 nets, phase outputs at motor pad
    #   BEMF_[ABC]_CH[1-4]       — 12 nets, back-EMF feedback per phase
    #   CSA_[ABC]_OUT_CH[1-4]    — 12 nets, INA output filter caps
    #   CSA_MAX_CH[1-4]          —  4 nets, CSA diode-OR
    #   SHUNT_[ABC]_TOP_CH[1-4]  — 12 nets, Kelvin sense (worker correction:
    #                              actual names use _TOP, not _POS/_NEG)
    #   GH[ABC]_CH[1-4]          — 12 nets, high-side gate-drive
    #   GL[ABC]_CH[1-4]          — 12 nets, low-side gate-drive
    #   BST[ABC]_CH[1-4]         — 12 nets, bootstrap-cap to HS gate
    #   +VMOTOR / VMOTOR_CH*     — bulk caps per phase
    # Components on ANY OTHER net inside motor-pad keep-out = G5 FAIL (drift).

  # ---- Tier 5: Signal highways ----


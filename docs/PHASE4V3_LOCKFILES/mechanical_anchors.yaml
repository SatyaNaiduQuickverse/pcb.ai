# Tier 1 mechanical anchors — immovable positions per Phase 4-v3 placement methodology
#
# These components have constraints from PHYSICS OUTSIDE the PCB (enclosure,
# mating connectors, mounting fixtures, current pads). Their position is set
# here as SSoT. Audit `audit_anchor_positions.py` enforces match to ±0.01mm.
#
# Changes require PR title tag `[invariant-change]` and `audit_routing_system.py --write`
# to recompute MECHANICAL_ANCHORS_HASH.
#
# Coords extracted 2026-05-25 from master HEAD (pre-REDO). Verified by:
# - mount holes: per enclosure spec (5,95 / 95,95 / 5,5 / 95,5 on 100x100 board)
# - fiducials: ≥3 per side, ≥40mm separation (IPC-7351 + Sai-catch #8)
# - J1 XT30: top edge mid-board
# - J11 FC header: bottom edge mid-board area (mates flight controller pin pitch)
# - J12 AUX: bottom-left area
#
# Tier 1 components from this lockfile MUST be placed BEFORE any Tier 2-5 components.
# park_all_components.py skips these (they stay at their lockfile positions, not parked).

version: 1
extracted_from_commit: 428bc3d  # Phase 4-v2 CH4 mirror, last "good" mechanical state pre-REDO
extracted_date: 2026-05-25

mount_holes:
  # 4× M3 standoff mounting holes at board corners (3.2mm drill)
  # Footprint: MountingHole_3.2mm_M3
  # Keep-out: 3mm radius copper-clear
  - ref: H1
    pos: [5.00, 95.00]
    layer: F.Cu
    rotation: 0
    footprint: MountingHole_3.2mm_M3
    keepout_radius_mm: 3.0
  - ref: H2
    pos: [95.00, 95.00]
    layer: F.Cu
    rotation: 0
    footprint: MountingHole_3.2mm_M3
    keepout_radius_mm: 3.0
  - ref: H3
    pos: [5.00, 5.00]
    layer: F.Cu
    rotation: 0
    footprint: MountingHole_3.2mm_M3
    keepout_radius_mm: 3.0
  - ref: H4
    pos: [95.00, 5.00]
    layer: F.Cu
    rotation: 0
    footprint: MountingHole_3.2mm_M3
    keepout_radius_mm: 3.0

fiducials:
  # 6× fiducials (3 top + 3 bottom), 1mm diameter, 2mm solder mask opening
  # Footprint: Fiducial_1mm_Mask2mm
  # Spacing ≥40mm per IPC-7351 (Sai-catch #8)
  - ref: FID1
    pos: [15.00, 50.00]
    layer: F.Cu
    rotation: 0
    footprint: Fiducial_1mm_Mask2mm
  - ref: FID2
    pos: [90.00, 50.00]
    layer: F.Cu
    rotation: 0
    footprint: Fiducial_1mm_Mask2mm
  - ref: FID3
    pos: [50.00, 85.00]
    layer: F.Cu
    rotation: 0
    footprint: Fiducial_1mm_Mask2mm
  - ref: FID4
    pos: [15.00, 50.00]
    layer: B.Cu
    rotation: 180
    footprint: Fiducial_1mm_Mask2mm
  - ref: FID5
    pos: [85.00, 50.00]
    layer: B.Cu
    rotation: 180
    footprint: Fiducial_1mm_Mask2mm
  - ref: FID6
    pos: [50.00, 15.00]
    layer: B.Cu
    rotation: 180
    footprint: Fiducial_1mm_Mask2mm

connectors:
  # J1 = XT30 battery input (top edge, mid-board)
  # NOTE: footprint in current master is PinHeader placeholder; replace with actual XT30 footprint
  - ref: J1
    pos: [50.00, 5.00]
    layer: F.Cu
    rotation: 0
    footprint: Connector_XT30  # to be set when proper footprint exists
    role: battery_input
    edge_distance_mm: 5.0  # top edge constraint (≤5mm per Sai-catch #5)
  # J11 = Flight controller header (bottom edge area)
  # Currently in spine for Phase 4-v2; may need to move per Phase 4-v3 review
  - ref: J11
    pos: [50.00, 38.00]
    layer: F.Cu
    rotation: 0
    footprint: SOT-23-8  # placeholder in current master; needs proper FC header footprint
    role: flight_controller_header
    edge_distance_mm: null  # FC header is central per current FPV 4-in-1 spec (not edge)
    note: "If actual FC pin pitch requires edge, move to (50, 90)"
  # J12 = AUX/DShot 6-pin header (bottom-left area, edge-pulled)
  - ref: J12
    pos: [25.00, 95.00]
    layer: F.Cu
    rotation: 0
    footprint: JST_SH_SM06B-SRSS-TB_1x06-1MP_P1.00mm_Horizontal
    role: aux_dshot_header
    edge_distance_mm: 5.0  # bottom edge constraint


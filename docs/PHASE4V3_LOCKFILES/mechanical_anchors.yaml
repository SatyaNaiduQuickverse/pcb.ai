# Tier 1 mechanical anchors — immovable positions per Phase 4-v3 placement methodology
#
# These components have constraints from PHYSICS OUTSIDE the PCB (enclosure,
# mating connectors, mounting fixtures, current pads). Their position is set
# here as SSoT. Audit `audit_anchor_positions.py` enforces match to ±0.01mm.
#
# Changes require PR title tag `[invariant-change]` and `audit_routing_system.py --write`
# to recompute MECHANICAL_ANCHORS_HASH.
#
# Coords extracted 2026-05-25 from master HEAD. Roles cross-checked against
# SKiDL netlist (worker-verified 2026-05-25):
#  - 4 mount holes, 6 fiducials per enclosure + IPC-7351
#  - 3 board connectors (J1 XT30, J11 FC, J12 AUX) at enclosure interface
#  - 12 motor phase pads (3 phases/CH × 4 CH) — BLDC physics reality
#  - 8 SWD test pads (DIO+CLK per CH × 4 CH)
#  - 4 BOOT jumper pads (per CH)
#  - 10 supply test pads (V5/V9/V3V3 inputs + GND distribution)
#  - 15 LEDs (5 global + 10 per-channel status)
#
# Tier 1 components MUST be placed BEFORE any Tier 2-5 components.
# park_all_components.py skips these (they stay at their lockfile positions).


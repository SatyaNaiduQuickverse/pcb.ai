  # Footprint: MountingHole_3.2mm_M3
  # Keep-out: 3mm radius copper-clear per IPC-7351 + Sai-catch #1
  - {ref: H1, pos: [5.00,  95.00], layer: F.Cu, rotation: 0, footprint: MountingHole_3.2mm_M3, keepout_radius_mm: 3.0}
  - {ref: H2, pos: [95.00, 95.00], layer: F.Cu, rotation: 0, footprint: MountingHole_3.2mm_M3, keepout_radius_mm: 3.0}
  - {ref: H3, pos: [5.00,  5.00],  layer: F.Cu, rotation: 0, footprint: MountingHole_3.2mm_M3, keepout_radius_mm: 3.0}
  - {ref: H4, pos: [95.00, 5.00],  layer: F.Cu, rotation: 0, footprint: MountingHole_3.2mm_M3, keepout_radius_mm: 3.0}


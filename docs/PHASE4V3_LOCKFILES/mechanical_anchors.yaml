motor_pads:
  # 12 motor phase pads — 3 phases (A,B,C) × 4 channels.
  # Netlist-verified roles (worker 2026-05-25): MOTOR_<phase>_CH<n>.
  # CH1 phases on west edge (x≈15), CH2 east (x≈85), CH3 east (x≈85), CH4 west (x≈15).
  #
  # FOOTPRINT: ESCMotorPad_4x4mm_5via — 4×4mm SMD pad on F.Cu + 5 through-hole vias
  # LOCKED 2026-05-25 PER SAI DECISION: option (b) — "safest sureshot, standard practice"
  #
  # IMPORTANT — VIA ELECTRICAL DESTINATION (corrected per worker 2026-05-25):
  # Vias carry the PHASE net (MOTOR_<A/B/C>_CH<n>), NOT +VMOTOR. Phase pads ARE the
  # switching node (HS-FET source / LS-FET drain), connecting them to +VMOTOR plane
  # would short HS-FET drain-source. Vias go F.Cu ↔ B.Cu phase copper. The +VMOTOR
  # plane on In3.Cu is isolated by antipad. Net effect = thermal+current spreading
  # onto B.Cu phase pour + any inner phase copper, NOT into +VMOTOR plane.
  #
  # PHYSICS: 100A burst per CH ÷ √3 ≈ 58A RMS per phase
  # PER IPC-2152: 4×4mm SMD pad (16mm²) + 5× 0.3mm drill / 0.6mm pad vias spread
  # current onto top + bottom copper on phase net → ~150A capacity per phase.
  # → 2.5× margin over 58A burst. STANDARD FPV ESC PRACTICE.
  #
  # Worker action in REDO infra PR:
  #   1. ✅ Created KiCad footprint `pcbai:ESCMotorPad_4x4mm_5via` (worker pre-built 2026-05-25)
  #   2. Update schematic to reference new footprint for 12 motor pad refs (TP19-TP42 family)
  #   3. Old TestPoint_Pad_D3.0mm refs stay valid but footprint reference changes
  #   4. audit_anchor_positions.py G1 compares on BARE footprint name (lib prefix `pcbai:` stripped)
  - {ref: TP19, pos: [15.00, 56.00], layer: F.Cu, rotation: 0,   footprint: ESCMotorPad_4x4mm_5via, role: motor_phase_A, channel: CH1, net: MOTOR_A_CH1}
  - {ref: TP20, pos: [15.00, 68.00], layer: F.Cu, rotation: 0,   footprint: ESCMotorPad_4x4mm_5via, role: motor_phase_B, channel: CH1, net: MOTOR_B_CH1}
  - {ref: TP21, pos: [15.00, 80.00], layer: F.Cu, rotation: 0,   footprint: ESCMotorPad_4x4mm_5via, role: motor_phase_C, channel: CH1, net: MOTOR_C_CH1}
  - {ref: TP26, pos: [85.00, 56.00], layer: F.Cu, rotation: 180, footprint: ESCMotorPad_4x4mm_5via, role: motor_phase_A, channel: CH2, net: MOTOR_A_CH2}
  - {ref: TP27, pos: [85.00, 68.00], layer: F.Cu, rotation: 180, footprint: ESCMotorPad_4x4mm_5via, role: motor_phase_B, channel: CH2, net: MOTOR_B_CH2}
  - {ref: TP28, pos: [85.00, 80.00], layer: F.Cu, rotation: 180, footprint: ESCMotorPad_4x4mm_5via, role: motor_phase_C, channel: CH2, net: MOTOR_C_CH2}
  - {ref: TP33, pos: [85.00, 44.00], layer: F.Cu, rotation: 180, footprint: ESCMotorPad_4x4mm_5via, role: motor_phase_A, channel: CH3, net: MOTOR_A_CH3}
  - {ref: TP34, pos: [85.00, 32.00], layer: F.Cu, rotation: 180, footprint: ESCMotorPad_4x4mm_5via, role: motor_phase_B, channel: CH3, net: MOTOR_B_CH3}
  - {ref: TP35, pos: [85.00, 20.00], layer: F.Cu, rotation: 180, footprint: ESCMotorPad_4x4mm_5via, role: motor_phase_C, channel: CH3, net: MOTOR_C_CH3}
  - {ref: TP40, pos: [15.00, 44.00], layer: F.Cu, rotation: 0,   footprint: ESCMotorPad_4x4mm_5via, role: motor_phase_A, channel: CH4, net: MOTOR_A_CH4}
  - {ref: TP41, pos: [15.00, 32.00], layer: F.Cu, rotation: 0,   footprint: ESCMotorPad_4x4mm_5via, role: motor_phase_B, channel: CH4, net: MOTOR_B_CH4}

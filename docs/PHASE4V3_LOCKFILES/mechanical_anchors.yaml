parking_grid:
  # Off-board parking coordinates for park_all_components.py
  # All non-Tier-1 components start here, brought onto board by per-subsystem PRs
  origin: [200.0, -50.0]
  spacing_mm: 5.0
  layer: F.Cu
  rotation: 0
  # Grid format: x = origin_x + (i % cols) * spacing, y = origin_y + (i // cols) * spacing
  # cols = 30 (covers ~150mm wide off-board area)
  cols: 30
